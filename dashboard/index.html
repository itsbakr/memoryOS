<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal Memory OS</title>
    <style>
        :root {
            --bg: #212121;
            --sidebar-bg: #171717;
            --chat-user-bg: #2f2f2f;
            --surface: #2f2f2f;
            --surface-hover: #424242;
            --text: #ececec;
            --text-dim: #b4b4b4;
            --high: #10a37f;
            --med: #eab308;
            --low: #f97316;
            --stale: #ef4444;
            --border: #424242;
            --border-light: rgba(255,255,255,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-size: 15px;
        }

        /* Layout */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
            flex-shrink: 0;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .memory-panel {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid var(--border-light);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* Sidebar UI */
        .new-chat-btn {
            background-color: transparent;
            color: var(--text);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            text-align: left;
            cursor: pointer;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 14px;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background-color: var(--surface-hover); }

        .session-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .session-item {
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-dim);
            transition: background 0.2s;
        }
        .session-item:hover { background-color: var(--surface-hover); color: var(--text); }
        .session-item.active { background-color: var(--surface); color: var(--text); font-weight: 500; }

        /* Chat UI */
        .chat-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding-bottom: 150px; /* space for input */
        }

        .message {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            gap: 1rem;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.6;
        }

        .message.user .message-content {
            background-color: var(--chat-user-bg);
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-content {
            background-color: transparent;
            padding-left: 0;
            padding-right: 0;
        }

        /* Contradiction Banner */
        .contradiction-banner {
            background-color: rgba(234, 179, 8, 0.1);
            border: 1px solid var(--med);
            border-radius: 8px;
            padding: 1.25rem;
            margin-top: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .contradiction-banner h4 { margin: 0 0 0.5rem 0; color: var(--med); }
        .conflict-text { color: var(--text-dim); margin-bottom: 1rem; font-size: 14px; }
        .conflict-buttons { display: flex; gap: 0.5rem; }
        .conflict-buttons button {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .conflict-buttons button:hover { background: var(--border); }

        /* Input Area */
        .input-container {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            padding: 0 2rem;
            box-sizing: border-box;
        }
        .input-box {
            background-color: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .input-box input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Memory Panel */
        .memory-panel h3 {
            margin-top: 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        .memory-item {
            background-color: var(--surface);
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 3px solid var(--border);
            font-size: 13px;
            margin-bottom: 0.75rem;
        }

        .conf-high { border-left-color: var(--high); }
        .conf-med { border-left-color: var(--med); }
        .conf-low { border-left-color: var(--low); }
        .conf-stale { border-left-color: var(--stale); opacity: 0.6; }

        .memory-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Working Memory Progress */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: var(--surface);
            border-radius: 3px;
            margin: 0.5rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--high);
            transition: width 0.3s ease;
        }
        
        .loading { color: var(--text-dim); font-style: italic; }

        @media (max-width: 900px) {
            .memory-panel { display: none; }
        }
    </style>
</head>
<body>

    <!-- Sidebar: Sessions -->
    <div class="sidebar">
        <button class="new-chat-btn" onclick="createNewSession()">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Chat
        </button>
        <div class="session-list" id="session-list">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Main Chat Window -->
    <div class="main-content">
        <div class="chat-scroll" id="chat-container">
            <div class="message agent">
                <div class="message-content">Hello! How can I help you today?</div>
            </div>
            <!-- Messages populated here -->
        </div>

        <div class="input-container">
            <div class="input-box">
                <input type="text" id="chat-input" placeholder="Message agent..." onkeypress="handleEnter(event)">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <!-- Right Panel: Live Memory -->
    <div class="memory-panel">
        <h3>Live Memory State</h3>
        
        <div style="margin-bottom: 2rem;">
            <div style="font-size: 13px; color: var(--text-dim); margin-bottom: 0.5rem;">WORKING MEMORY</div>
            <div id="working-memory-card" style="background: var(--surface); padding: 1rem; border-radius: 6px; font-size: 13px;">
                <div class="loading">No active task</div>
            </div>
        </div>

        <div>
            <div style="font-size: 13px; color: var(--text-dim); margin-bottom: 0.5rem; display: flex; justify-content: space-between;">
                <span>EPISODIC FACTS</span>
                <span id="token-savings" style="color: var(--high); font-weight: bold;">0 saved</span>
            </div>
            <div id="episodic-list">
                <div class="loading">Loading memories...</div>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let currentAgentId = "demo-agent";

        // Polling interval reference
        let memoryPollInterval = null;

        // Initialize
        async function init() {
            await loadSessions();
            if (!currentSessionId) {
                await createNewSession();
            }
            startMemoryPolling();
        }

        async function createNewSession() {
            const res = await fetch('/api/sessions', { method: 'POST' });
            const data = await res.json();
            currentSessionId = data.session_id;
            currentAgentId = data.agent_id;
            
            document.getElementById('chat-container').innerHTML = `
                <div class="message agent">
                    <div class="message-content">Hello! How can I help you today?</div>
                </div>
            `;
            await loadSessions();
            updateMemoryStats(); // Immediate fetch for new agent
        }

        async function loadSessions() {
            const res = await fetch('/api/sessions');
            const data = await res.json();
            const list = document.getElementById('session-list');
            
            if (data.sessions.length > 0 && !currentSessionId) {
                currentSessionId = data.sessions[0].session_id;
                currentAgentId = data.sessions[0].agent_id;
            }

            list.innerHTML = data.sessions.map(s => `
                <div class="session-item ${s.session_id === currentSessionId ? 'active' : ''}" 
                     onclick="switchSession('${s.session_id}', '${s.agent_id}')">
                    ${s.title}
                </div>
            `).join('');
        }

        async function switchSession(sid, aid) {
            currentSessionId = sid;
            currentAgentId = aid;
            const container = document.getElementById('chat-container');
            container.innerHTML = `
                <div class="message agent">
                    <div class="message-content">Loading history...</div>
                </div>
            `;
            loadSessions();
            updateMemoryStats();
            
            try {
                const res = await fetch(`/api/chat/history?session_id=${sid}`);
                const data = await res.json();
                
                container.innerHTML = ''; // clear loading
                
                if (data.history.length === 0) {
                    appendMessage('agent', 'Hello! How can I help you today?');
                } else {
                    data.history.forEach(msg => {
                        appendMessage(msg.role, msg.content);
                    });
                }
            } catch (e) {
                container.innerHTML = `
                    <div class="message agent">
                        <div class="message-content">Hello! How can I help you today?</div>
                    </div>
                `;
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function appendMessage(role, text, isHtml=false) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (isHtml) {
                contentDiv.innerHTML = text;
            } else {
                contentDiv.innerText = text;
            }
            
            msgDiv.appendChild(contentDiv);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            const btn = document.getElementById('send-btn');
            
            if (!text || !currentSessionId) return;
            
            appendMessage('user', text);
            input.value = '';
            btn.disabled = true;

            // Loading indicator
            const loadingMsg = appendMessage('agent', '...');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: text
                    })
                });

                const data = await res.json();
                
                // Remove loading
                loadingMsg.remove();

                // Append reply
                if (data.reply) {
                    appendMessage('agent', data.reply);
                }

                // Handle Contradiction
                if (data.contradiction) {
                    const c = data.contradiction;
                    const html = `
                        <div class="contradiction-banner" id="contra-${c.contradiction_id}">
                            <h4>Conflict Detected</h4>
                            <div class="conflict-text">
                                <div><strong>Old Memory:</strong> ${c.conflicts_with}</div>
                                <div style="margin-top: 4px;"><strong>New Observation:</strong> ${c.new_fact}</div>
                            </div>
                            <div class="conflict-buttons">
                                <button onclick="resolveContradiction('${c.contradiction_id}', \`${c.new_fact.replace(/"/g, '&quot;')}\`, this)">Keep New</button>
                                <button onclick="resolveContradiction('${c.contradiction_id}', \`${c.conflicts_with.replace(/"/g, '&quot;')}\`, this)">Keep Old</button>
                            </div>
                        </div>
                    `;
                    appendMessage('agent', html, true);
                }
                
                // Update Sidebar titles
                loadSessions();
                // Force memory update
                updateMemoryStats();

            } catch (e) {
                loadingMsg.innerText = 'Error: Failed to fetch response.';
                console.error(e);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        async function resolveContradiction(eventId, chosenFact, btnElement) {
            const banner = document.getElementById(`contra-${eventId}`);
            banner.style.opacity = '0.5';
            banner.style.pointerEvents = 'none';

            await fetch(`/api/contradictions/${eventId}/resolve?agent_id=${currentAgentId}&chosen_fact=${encodeURIComponent(chosenFact)}`, {
                method: 'POST'
            });

            banner.innerHTML = `<div style="color: var(--high)">Resolved! Stored: "${chosenFact}"</div>`;
            updateMemoryStats();
        }

        function startMemoryPolling() {
            if (memoryPollInterval) clearInterval(memoryPollInterval);
            memoryPollInterval = setInterval(updateMemoryStats, 3000);
        }

        async function updateMemoryStats() {
            if (!currentAgentId) return;

            try {
                const res = await fetch(`/api/memory/stats?agent_id=${currentAgentId}`);
                const stats = await res.json();

                // Token Savings
                const savings = stats.total_memories * 150 - (stats.memories.length * 150);
                document.getElementById('token-savings').innerText = Math.max(0, savings).toLocaleString() + ' saved';

                // Working Memory
                const wm = document.getElementById('working-memory-card');
                if (stats.working_memory) {
                    const pct = stats.working_memory.progress_pct;
                    wm.innerHTML = `
                        <div style="font-weight: bold; margin-bottom: 0.5rem;">${stats.working_memory.task}</div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${pct}%"></div>
                        </div>
                        <div style="color: var(--text-dim); margin-top: 0.5rem;">Action: ${stats.working_memory.last_action || 'None'}</div>
                    `;
                } else {
                    wm.innerHTML = '<div class="loading">No active task</div>';
                }

                // Episodic List
                const episodic = document.getElementById('episodic-list');
                if (stats.memories.length === 0) {
                    episodic.innerHTML = '<div class="loading">No memories stored yet.</div>';
                } else {
                    episodic.innerHTML = stats.memories.map(m => {
                        let confClass = 'conf-high';
                        if (m.confidence < 0.7) confClass = 'conf-med';
                        if (m.confidence < 0.4) confClass = 'conf-low';
                        if (m.confidence < 0.1) confClass = 'conf-stale';

                        return `
                            <div class="memory-item ${confClass}">
                                <div>${m.content}</div>
                                <div class="memory-meta">
                                    <span>conf: ${m.confidence.toFixed(2)}</span>
                                    <span>age: ${m.age_hours}h</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                console.error("Failed to fetch memory stats", e);
            }
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
